<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aly - Virtual Art</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
        AFRAME.registerComponent('interactiv', {
            init: function () {
                let el = this.el;
                let posInitiala = el.getAttribute('position');
                
                // 1. HOVER ZOOM
                el.addEventListener('mouseenter', function () {
                    el.setAttribute('animation', { property: 'scale', to: '1.2 1.2 1.2', dur: 200 });
                    el.setAttribute('position', {x: posInitiala.x, y: posInitiala.y, z: posInitiala.z + 0.3});
                });

                el.addEventListener('mouseleave', function () {
                    el.setAttribute('animation', { property: 'scale', to: '1 1 1', dur: 200 });
                    el.setAttribute('position', posInitiala);
                });

                // 2. ENGLISH AUDIO GUIDE (CLICK)
                el.addEventListener('click', function () {
                    let infoEntitate = el.querySelector('.info-text');
                    let textDeCitit = infoEntitate.getAttribute('value');
                    
                    window.speechSynthesis.cancel(); 

                    let mesaj = new SpeechSynthesisUtterance(textDeCitit);
                    mesaj.lang = 'en-US'; // SETARE LIMBA ENGLEZA
                    mesaj.rate = 0.9;    

                    window.speechSynthesis.speak(mesaj);

                    infoEntitate.setAttribute('visible', 'true');
                    setTimeout(() => { infoEntitate.setAttribute('visible', 'false'); }, 6000);
                });
            }
        });
    </script>
</head>
<body>
    <a-scene>
        <a-assets>
            <img id="podea" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
            <script>
                for(let i=1; i<=25; i++) {
                    document.write(`<img id="t${i}" src="assets/tablou${i}.jpg">`);
                }
            </script>
        </a-assets>

        <a-sky color="#050505"></a-sky>
        <a-plane src="#podea" rotation="-90 0 0" width="50" height="50" repeat="10 10"></a-plane>

        <a-entity position="0 2.5 -10">
            <a-image interactiv src="#t1" position="-9 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 1: Spring Symphony. A botanical study of the common lilac." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t2" position="-6 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 2: Path to Serenity. A forest landscape during twilight." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t3" position="-3 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 3: Amber Essence. Contrast between vibrant petals and a dark background." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t4" position="0 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 4: Festival of Colors. An infinite horizon of multicolored tulips." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t5" position="3 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 5: Solar Warmth. Close-up on the texture of orange tulips." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t6" position="6 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 6: Pink Elegance. An ethological study of a flamingo group." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t7" position="9 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 7: Primitive Curiosity. The interaction between wildlife and human structures." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
        </a-entity>

        <a-entity position="0 2.5 10" rotation="0 180 0">
            <a-image interactiv src="#t8" position="-9 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 8: Meditation. A portrait of an orangutan in its natural habitat." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t9" position="-6 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 9: Vigilance. Study of the expressiveness of small primates." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t10" position="-3 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 10: Predator Innocence. A young feline portrait in the wild." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t11" position="0 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 11: Majestic Strength. Panthera tigris in its natural environment." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t12" position="3 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 12: Spirit of the Heights. Rare capture of a snow leopard." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t13" position="6 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 13: Memory of Giants. Texture study of an elephant's skin." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t14" position="9 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 14: Rhythm and Contrast. The optical camouflage of zebras." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
        </a-entity>

        <a-entity position="-12 2.5 0" rotation="0 90 0">
            <a-image interactiv src="#t15" position="-7.5 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 15: Dynamism and Freedom. Equestrian portrait focused on elegance." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t16" position="-4.5 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 16: Night Sentinel. A study of an owl's plumage." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t17" position="-1.5 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 17: Gaze from the Woods. The fragility of a deer in the wild." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t18" position="1.5 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 18: Nature's Geometry. Chromatic detail of a peacock's tail." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t19" position="4.5 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 19: Tropical Spectrum. Biodiversity of the jungle through the Macaw." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t20" position="7.5 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 20: Urban Harmony. A study of birds in the city environment." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
        </a-entity>

        <a-entity position="12 2.5 0" rotation="0 -90 0">
            <a-image interactiv src="#t21" position="-6 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 21: Silence of the Snow. A minimalist winter mountain landscape." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t22" position="-3 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 22: Azure Mirror. Reflections on the surface of calm water." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t23" position="0 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 23: Fragrance of Provence. Infinite field of violet lavender." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t24" position="3 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 24: Horizon in Flames. The last sunset over the sea." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
            <a-image interactiv src="#t25" position="6 0 0" width="2.5" height="3.5"><a-text class="info-text" value="Artwork 25: Nocturnal Pulse. Architecture and artificial lights at the gallery's end." position="0 -2 0.1" align="center" width="3" visible="false"></a-text></a-image>
        </a-entity>

        <a-entity camera look-controls wasd-controls position="0 1.6 0">
            <a-cursor color="red" raycaster="objects: [interactiv]"></a-cursor>
        </a-entity>
    </a-scene>
</body>
</html>
